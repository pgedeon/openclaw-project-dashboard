<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/dashboard-shared.css">
    <style>
        /* Page-specific styles for Operations */

        /* Grid layout */
        .ops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .ops-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-soft);
        }

        .ops-card h2 {
            margin: 0 0 16px 0;
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ops-card h2 .icon { font-size: 1.2rem; }

        /* Health overview */
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .health-item {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            text-align: center;
        }

        .health-item .label {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .health-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Fraunces', serif;
        }

        .health-item.healthy .value { color: var(--success); }
        .health-item.warning .value { color: var(--warning); }
        .health-item.critical .value { color: var(--danger); }

        /* Tables */
        .ops-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .ops-table th {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid var(--border);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }

        .ops-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .ops-table tr:last-child td { border-bottom: none; }

        .ops-table .name { font-weight: 600; }

        /* Cron job list */
        .cron-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .cron-item:last-child { border-bottom: none; }

        .cron-item .info { flex: 1; min-width: 0; }
        .cron-item .job-id {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cron-item .schedule {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: 'Space Grotesk', monospace;
        }

        /* Agent pulse */
        .agent-list { display: flex; flex-direction: column; gap: 8px; }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        .agent-pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-pulse.active { background: var(--success); box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
        .agent-pulse.idle { background: var(--muted); }
        .agent-pulse.stale { background: var(--warning); }

        .agent-name { font-weight: 600; flex: 1; }
        .agent-seen { font-size: 0.78rem; color: var(--muted); }

        /* Full-width card */
        .ops-card.full-width { grid-column: 1 / -1; }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .skeleton-line { height: 16px; margin-bottom: 8px; }
        .skeleton-line:last-child { width: 60%; }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

        /* Metrics bar chart */
        .metric-bar-container { margin-bottom: 10px; }
        .metric-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            margin-bottom: 4px;
        }
        .metric-bar-label .agent { font-weight: 600; }
        .metric-bar-label .count { color: var(--muted); }
        .metric-bar-track {
            height: 8px;
            background: var(--surface-2);
            border-radius: 4px;
            overflow: hidden;
        }
        .metric-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        @media (max-width: 720px) {
            .ops-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div class="title-block">
                <span class="page-kicker">System Monitor</span>
                <h1>Operations</h1>
                <p>System health, cron jobs, agent status, and service requests — the operational heartbeat of your stack.</p>
                <nav class="page-nav" aria-label="Dashboard pages">
                    <a href="/">Tasks</a>
                    <a href="/agents">Agents</a>
                    <a href="/skills-tools">Skills &amp; Tools</a>
                    <a href="/operations" aria-current="page">Operations</a>
                    <a href="/workflows">Workflows</a>
                </nav>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
                    <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
                    <span class="theme-toggle-label">Dark</span>
                </button>
                <button class="secondary-btn" id="refreshBtn" type="button">↻ Refresh</button>
            </div>
        </header>

        <div class="notice" id="notice" role="alert" aria-live="assertive"></div>

        <div class="ops-grid" id="opsRoot">
            <!-- Health Overview -->
            <div class="ops-card" id="healthCard">
                <h2><span class="icon">🏥</span> System Health</h2>
                <div class="health-grid" id="healthGrid">
                    <div class="health-item"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
                    <div class="health-item"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
                    <div class="health-item"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
                    <div class="health-item"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
                </div>
            </div>

            <!-- Cron Jobs -->
            <div class="ops-card" id="cronCard">
                <h2><span class="icon">⏱</span> Cron Jobs</h2>
                <div id="cronList">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                </div>
            </div>

            <!-- Agent Heartbeats -->
            <div class="ops-card" id="agentsCard">
                <h2><span class="icon">💓</span> Agent Status</h2>
                <div id="agentsList">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                </div>
            </div>

            <!-- Service Requests -->
            <div class="ops-card" id="servicesCard">
                <h2><span class="icon">📨</span> Service Requests</h2>
                <div id="servicesList">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                </div>
            </div>

            <!-- Agent Productivity -->
            <div class="ops-card full-width" id="metricsCard">
                <h2><span class="icon">📊</span> Agent Productivity (24h)</h2>
                <div id="metricsContent">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/src/scripts/theme-manager.js"></script>
    <script>
        (function killStaleSW() {
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') return;
            if (!('serviceWorker' in navigator)) return;
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                registrations.forEach(function(reg) {
                    if (reg.active) reg.active.postMessage({ type: 'SELF_DESTRUCT' });
                });
                setTimeout(function() {
                    Promise.all(registrations.map(function(r) { return r.unregister(); })).then(function() {
                        if ('caches' in window) return caches.keys().then(function(ks) {
                            return Promise.all(ks.filter(function(k) { return k.startsWith('openclaw-dashboard-'); }).map(function(k) { return caches.delete(k); }));
                        });
                    });
                }, 500);
            });
        })();
    </script>
    <script type="module" src="/src/operations-page.mjs"></script>
</body>
</html>
